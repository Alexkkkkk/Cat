<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plushie Cat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        /* Добавляем мягкий градиент на фон */
        body { background: linear-gradient(180deg, #fdf2f8 0%, #fae8ff 100%); }
    </style>
</head>
<body class="flex flex-col items-center justify-start min-h-screen p-6 font-sans">

    <div id="ton-connect" class="w-full flex justify-end mb-4"></div>

    <div class="bg-white/80 backdrop-blur-md p-8 rounded-[2rem] shadow-2xl text-center max-w-sm w-full border border-white/50">
        <div class="relative mx-auto w-32 h-32 mb-6">
            <img src="static/images/logo.png" alt="Plushie Cat" 
                 class="w-full h-full object-cover rounded-3xl border-4 border-white shadow-lg">
        </div>
        
        <h1 class="text-4xl font-extrabold text-pink-600 mb-2 tracking-tight">Plushie Cat</h1>
        <p class="text-pink-400 font-medium mb-8 text-sm uppercase tracking-widest">Мир плюшевых друзей</p>
        
        <p class="text-gray-600 leading-relaxed mb-8 px-2">
            Присоединяйтесь к нашему уютному сообществу. Собирайте, меняйте и заботьтесь о своих котиках!
        </p>

        <div id="status-block" class="hidden transition-all duration-500 ease-in-out transform">
            <div class="bg-green-100 text-green-700 py-3 px-6 rounded-2xl border border-green-200 font-semibold flex items-center justify-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                Кошелек подключен
            </div>
        </div>
    </div>

    <div class="mt-auto pt-8 text-gray-400 text-xs">
        Plushie Cat © 2026
    </div>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://catplushie.bothost.tech/static/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        tonConnectUI.onStatusChange((wallet) => {
            const statusBlock = document.getElementById('status-block');
            if (wallet) {
                statusBlock.classList.remove('hidden');
            } else {
                statusBlock.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
