<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plushie Cat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background: linear-gradient(180deg, #fdf2f8 0%, #fae8ff 100%); }
    </style>
</head>
<body class="flex flex-col items-center justify-start min-h-screen p-6 font-sans">

    <div class="w-full flex justify-between items-center mb-4 max-w-sm">
        <button id="lang-btn" onclick="toggleLanguage()" class="bg-white px-4 py-1.5 rounded-full text-sm font-bold text-pink-600 shadow-sm border border-pink-100 transition-all hover:scale-105">
            RU
        </button>
        <div id="ton-connect"></div>
    </div>

    <div class="bg-white/80 backdrop-blur-md p-8 rounded-[2rem] shadow-2xl text-center max-w-sm w-full border border-white/50 mb-6">
        <div class="relative mx-auto w-32 h-32 mb-6">
            <img src="static/images/logo.png" alt="Plushie Cat" class="w-full h-full object-cover rounded-3xl border-4 border-white shadow-lg">
        </div>
        <h1 id="title" class="text-4xl font-extrabold text-pink-600 mb-2 tracking-tight">Plushie Cat</h1>
        <p id="subtitle" class="text-pink-400 font-medium mb-6 text-sm uppercase tracking-widest">Мир плюшевых друзей</p>
        
        <div class="bg-pink-100 p-4 rounded-2xl mb-6 border border-pink-200">
            <p class="text-xs text-pink-500 uppercase font-bold" id="balance-label">Ваш баланс</p>
            <p class="text-3xl font-black text-pink-700"><span id="balance-count">0</span> CATP</p>
        </div>

        <button onclick="buyCoins()" id="buy-btn" class="w-full bg-gradient-to-r from-pink-500 to-purple-500 text-white py-3 rounded-2xl font-bold text-lg shadow-xl mb-6 transform active:scale-95 transition-all">
            Купить 100 CATP
        </button>

        <div id="status-block" class="hidden">
            <div class="bg-green-100 text-green-700 py-2 px-4 rounded-full border border-green-200 text-sm font-semibold flex items-center justify-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span id="wallet-text">Кошелек подключен</span>
            </div>
        </div>
    </div>

    <div class="bg-white/60 backdrop-blur-md p-6 rounded-[2rem] max-w-sm w-full border border-white/50 shadow-lg mb-6 text-center">
        <h2 id="ref-title" class="text-xl font-bold text-pink-600 mb-2">Рефералы</h2>
        <p class="text-3xl font-black text-gray-700 mb-4" id="ref-count">0</p>
        <button onclick="copyLink()" id="ref-btn" class="bg-pink-500 text-white px-6 py-2 rounded-full font-bold text-sm shadow-lg hover:bg-pink-600 transition-all">
            Скопировать ссылку
        </button>
    </div>

    <div class="bg-white/60 backdrop-blur-md p-6 rounded-[2rem] max-w-sm w-full border border-white/50 shadow-lg">
        <h2 id="roadmap-title" class="text-xl font-bold text-pink-600 mb-6 text-center">Наш путь</h2>
        <div class="relative border-l-2 border-pink-200 ml-3 space-y-8">
            <div class="relative pl-6">
                <div class="absolute -left-[9px] top-1 w-4 h-4 bg-pink-500 rounded-full"></div>
                <h3 id="rm-1-title" class="font-bold text-gray-800">Запуск проекта</h3>
                <p id="rm-1-desc" class="text-xs text-gray-500">Бот, WebApp, TON Connect</p>
            </div>
            <div class="relative pl-6">
                <div class="absolute -left-[9px] top-1 w-4 h-4 bg-pink-300 rounded-full"></div>
                <h3 id="rm-2-title" class="font-bold text-gray-800">Экономика</h3>
                <p id="rm-2-desc" class="text-xs text-gray-500">Внедрение CATP токенов</p>
            </div>
            <div class="relative pl-6">
                <div class="absolute -left-[9px] top-1 w-4 h-4 bg-pink-200 rounded-full"></div>
                <h3 id="rm-3-title" class="font-bold text-gray-800">NFT Коллекция</h3>
                <p id="rm-3-desc" class="text-xs text-gray-500">Мини-игра и маркетплейс</p>
            </div>
        </div>
    </div>

    <div class="mt-auto pt-8 text-gray-400 text-xs">Plushie Cat © 2026</div>

    <script>
        const userId = window.Telegram.WebApp.initDataUnsafe?.user?.id || 0;

        const translations = {
            ru: {
                lang: "RU", title: "Plushie Cat", subtitle: "Мир плюшевых друзей",
                balance_label: "Ваш баланс", buy: "Купить 100 CATP",
                wallet: "Кошелек подключен", roadmap: "Наш путь",
                rm1t: "Запуск проекта", rm1d: "Бот, WebApp, TON Connect",
                rm2t: "Экономика", rm2d: "Внедрение CATP токенов",
                rm3t: "NFT Коллекция", rm3d: "Мини-игра и маркетплейс",
                ref: "Рефералы", copy: "Скопировать ссылку"
            },
            en: {
                lang: "EN", title: "Plushie Cat", subtitle: "World of plush friends",
                balance_label: "Your balance", buy: "Buy 100 CATP",
                wallet: "Wallet connected", roadmap: "Our Roadmap",
                rm1t: "Project Launch", rm1d: "Bot, WebApp, TON Connect",
                rm2t: "Tokenomics", rm2d: "CATP token integration",
                rm3t: "NFT Collection", rm3d: "Mini-game & Marketplace",
                ref: "Referrals", copy: "Copy Link"
            }
        };

        let currentLang = 'ru';

        function toggleLanguage() {
            currentLang = currentLang === 'ru' ? 'en' : 'ru';
            const t = translations[currentLang];
            document.getElementById('lang-btn').innerText = t.lang;
            document.getElementById('title').innerText = t.title;
            document.getElementById('subtitle').innerText = t.subtitle;
            document.getElementById('balance-label').innerText = t.balance_label;
            document.getElementById('buy-btn').innerText = t.buy;
            document.getElementById('wallet-text').innerText = t.wallet;
            document.getElementById('roadmap-title').innerText = t.roadmap;
            document.getElementById('rm-1-title').innerText = t.rm1t;
            document.getElementById('rm-1-desc').innerText = t.rm1d;
            document.getElementById('rm-2-title').innerText = t.rm2t;
            document.getElementById('rm-2-desc').innerText = t.rm2d;
            document.getElementById('rm-3-title').innerText = t.rm3t;
            document.getElementById('rm-3-desc').innerText = t.rm3d;
            document.getElementById('ref-title').innerText = t.ref;
            document.getElementById('ref-btn').innerText = t.copy;
        }

        // Загрузка данных
        fetch(`/api/balance/${userId}`)
            .then(res => res.json())
            .then(data => { document.getElementById('balance-count').innerText = data.balance; });

        fetch(`/api/stats/${userId}`)
            .then(res => res.json())
            .then(data => { document.getElementById('ref-count').innerText = data.referrals; });

        function buyCoins() {
            fetch(`/api/buy/${userId}`, { method: 'POST' })
                .then(() => {
                    alert("Успешно! Баланс обновлен.");
                    location.reload();
                });
        }

        function copyLink() {
            const link = `https://t.me/CatPlushieBot?start=${userId}`;
            navigator.clipboard.writeText(link);
            alert("Ссылка скопирована!");
        }

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://catplushie.bothost.tech/static/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        tonConnectUI.onStatusChange((wallet) => {
            document.getElementById('status-block').classList.toggle('hidden', !wallet);
        });
    </script>
</body>
</html>
