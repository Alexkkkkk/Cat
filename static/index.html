<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plushie Cat</title>
    <!-- Подключаем Tailwind CSS для красивого дизайна -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Подключаем TON Connect UI -->
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body class="bg-pink-50 flex flex-col items-center justify-center min-h-screen p-4">

    <!-- Контейнер для кошелька -->
    <div id="ton-connect" class="mb-8"></div>

    <!-- Основной блок -->
    <div class="bg-white p-8 rounded-3xl shadow-xl text-center max-w-sm w-full border border-pink-100">
        <img src="/static/images/logo.png" alt="Plushie Cat" class="w-32 h-32 mx-auto mb-6 rounded-full border-4 border-pink-200">
        
        <h1 class="text-3xl font-bold text-pink-600 mb-4">Plushie Cat</h1>
        <p class="text-gray-600 leading-relaxed">
            Мы создаем проект, где каждый плюшевый котик находит свое место...
        </p>
    </div>

    <script>
        // Инициализация TON Connect
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://catplushie.bothost.tech/static/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });
    </script>
</body>
</html>
